<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Dashboard · CapEx Portfolio</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<nav class="nav-header">
  <div class="nav-container">
    <div class="nav-brand">
      <div class="nav-logo">NEXUS</div>
      <div class="nav-divider"></div>
      <div class="nav-system">CapEx Program Control Tower</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab" data-page="index.html"       onclick="go('index.html')">Home</button>
      <button class="nav-tab active" data-page="executive.html" onclick="go('executive.html')">Executive Dashboard</button>
      <button class="nav-tab" data-page="supply-chain.html" onclick="go('supply-chain.html')">Strategic Supply Chain</button>
      <button class="nav-tab" data-page="execution-risk.html" onclick="go('execution-risk.html')">Execution &amp; Risk</button>
      <button class="nav-tab" data-page="deep-dive.html"   onclick="go('deep-dive.html')">Deep Dive</button>
      <button class="nav-tab" onclick="go('sourcing-framework.html')">Sourcing Framework</button>
    </div>
    <div class="nav-actions">
      <button class="nav-btn">Export</button>
      <button class="nav-btn primary" onclick="location.href='downloads/CapEx_StrategicSC_Portfolio.xlsx'">↓ Workbook</button>
    </div>
  </div>
</nav>

<main class="dashboard">

  <header class="exec-header">
    <h1 class="exec-title">Executive Dashboard</h1>
    <p class="exec-subtitle" id="execSubtitle"></p>
    <div class="exec-meta" id="execMeta"></div>
  </header>

  <!-- KPI ROW — populated by executive.js from PROGRAMS[active] -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- INSIGHT STRIP -->
  <div class="insight-strip" id="insightStrip"></div>

  <!-- CHART ROW 1 -->
  <div class="grid grid-2">
    <div class="card">
      <div class="card-header">
        <div>
          <span class="card-title">CapEx Allocation by Equipment Category</span>
          <span class="card-insight" id="donutInsight"></span>
        </div>
        <span class="card-badge badge-blue" id="donutBadge"></span>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="capexDonut"></canvas></div>
        <div class="legend-row" id="donutLegend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div>
          <span class="card-title" id="barTitle">Equipment Deployment Status by Category</span>
          <span class="card-insight" id="barInsight"></span>
        </div>
        <span class="card-badge" id="barBadge"></span>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="statusBar"></canvas></div>
        <div class="legend-row" id="barLegend"></div>
        <div class="table-fn" id="barFootnote"></div>
      </div>
    </div>
  </div>

  <!-- CHART ROW 2 -->
  <div class="grid grid-2">
    <div class="card" id="thirdCard"></div>
    <div class="card">
      <div class="card-header">
        <div>
          <span class="card-title" id="healthTitle">Program Health Summary</span>
          <span class="card-insight" id="healthInsight"></span>
        </div>
      </div>
      <div class="card-body">
        <div class="health-grid" id="healthGrid" style="margin-bottom:14px;"></div>
        <ul class="dl" id="decisionList"></ul>
      </div>
    </div>
  </div>

  <!-- MILESTONE / READINESS SECTION — populated by executive.js -->
  <div id="milestoneSection"></div>

</main>
<div id="site-footer"></div>
<script src="assets/js/programs-data.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/executive.js"></script>
</body>
</html>
